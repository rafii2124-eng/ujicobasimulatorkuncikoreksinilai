<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Grade AI - Koreksi Otomatis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .animate-pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-12">

    <nav class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <i data-lucide="brain-circuit" class="w-8 h-8"></i>
                <h1 class="text-2xl font-bold tracking-tight">Smart Grade AI</h1>
            </div>
            <div class="flex bg-indigo-800/50 p-1 rounded-xl gap-1">
                <button onclick="switchTab('keys')" id="btn-keys" class="tab-btn px-4 py-2 rounded-lg transition-all text-sm font-bold bg-white text-indigo-700 shadow">Kunci Jawaban</button>
                <button onclick="switchTab('upload')" id="btn-upload" class="tab-btn px-4 py-2 rounded-lg transition-all text-sm font-bold text-white hover:bg-indigo-600">Koreksi</button>
                <button onclick="switchTab('recap')" id="btn-recap" class="tab-btn px-4 py-2 rounded-lg transition-all text-sm font-bold text-white hover:bg-indigo-600">Rekap</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        
        <!-- TAB 1: Master Kunci -->
        <div id="tab-keys" class="tab-content active space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">Pengaturan Kunci Jawaban</h2>
                <div class="flex gap-2">
                    <button onclick="clearKeys()" class="text-xs text-rose-500 font-bold px-3 py-2">Reset</button>
                    <label class="cursor-pointer bg-indigo-600 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-indigo-700 transition-all flex items-center gap-2">
                        <i data-lucide="file-up" class="w-4 h-4"></i> Scan Kunci
                        <input type="file" class="hidden" accept="image/*,application/pdf" onchange="processFile(event, 'key')">
                    </label>
                </div>
            </div>

            <div id="loader-key" class="hidden p-8 bg-white border-2 border-dashed border-indigo-200 rounded-2xl text-center space-y-3">
                <div class="inline-block w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-indigo-600 font-bold animate-pulse-slow">AI sedang menganalisis kunci...</p>
                <p id="retry-status-key" class="text-[10px] text-slate-400"></p>
            </div>

            <div class="grid lg:grid-cols-2 gap-6">
                <div class="bg-white p-4 rounded-2xl shadow-sm border">
                    <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="list-checks" class="text-indigo-600"></i> Pilihan Ganda</h3>
                    <div id="pg-container" class="space-y-2 max-h-[500px] overflow-y-auto pr-2"></div>
                    <button onclick="addItem('multipleChoice')" class="mt-4 w-full py-2 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-bold hover:border-indigo-300 hover:text-indigo-500 transition-all text-xs">+ Tambah Nomor</button>
                </div>
                <div class="space-y-6">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border">
                        <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="edit-3" class="text-blue-600"></i> Isian Singkat</h3>
                        <div id="isian-container" class="space-y-2"></div>
                        <button onclick="addItem('shortAnswer')" class="mt-2 text-xs text-blue-600 font-bold">+ Tambah Isian</button>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border">
                        <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="file-text" class="text-orange-600"></i> Esai</h3>
                        <div id="esai-container" class="space-y-2"></div>
                        <button onclick="addItem('essay')" class="mt-2 text-xs text-orange-600 font-bold">+ Tambah Esai</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB 2: Koreksi -->
        <div id="tab-upload" class="tab-content max-w-2xl mx-auto space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-xl border space-y-6">
                <div class="space-y-4">
                    <input type="text" id="student-name" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 ring-indigo-500 font-bold" placeholder="Nama Siswa">
                    <label class="w-full flex items-center justify-center gap-3 p-10 border-2 border-dashed border-slate-200 rounded-3xl cursor-pointer hover:bg-slate-50 transition-all">
                        <div class="text-center">
                            <i data-lucide="camera" class="w-12 h-12 mx-auto text-slate-300 mb-2"></i>
                            <p class="font-bold text-slate-500">Scan Jawaban Siswa</p>
                            <input type="file" class="hidden" accept="image/*,application/pdf" onchange="processFile(event, 'student')">
                        </div>
                    </label>
                </div>

                <div id="loader-student" class="hidden p-6 bg-emerald-50 text-emerald-700 rounded-2xl text-center font-bold animate-pulse">
                    <div class="flex items-center justify-center gap-2">
                        <div class="w-4 h-4 border-2 border-emerald-700 border-t-transparent rounded-full animate-spin"></div>
                        <span>Menganalisis Jawaban...</span>
                    </div>
                </div>

                <div id="error-display" class="hidden p-4 bg-rose-50 text-rose-600 rounded-xl text-xs border border-rose-100"></div>

                <div class="space-y-4 pt-4 border-t" id="correction-area">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest">Review Jawaban Siswa</h4>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Jawaban Pilihan Ganda (Hanya Huruf)</label>
                        <input id="pg-student-input" class="w-full p-4 border rounded-xl text-xl font-mono tracking-[0.4em] uppercase" placeholder="ABCDE...">
                    </div>
                    <div id="manual-review" class="space-y-3"></div>
                    <button id="btn-submit" onclick="submitFinal()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> HITUNG & SIMPAN NILAI
                    </button>
                </div>
            </div>
        </div>

        <!-- TAB 3: Rekap -->
        <div id="tab-recap" class="tab-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">Daftar Nilai Siswa</h2>
                <div class="flex gap-2">
                    <button onclick="downloadCSV()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-xs font-bold">Ekspor CSV</button>
                    <button onclick="clearRecap()" class="text-xs text-rose-500 font-bold">Reset Data</button>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] uppercase font-black text-slate-400">
                        <tr>
                            <th class="p-4">Nama Siswa</th>
                            <th class="p-4">PG</th>
                            <th class="p-4">Isian</th>
                            <th class="p-4">Esai</th>
                            <th class="p-4 text-center">Total</th>
                        </tr>
                    </thead>
                    <tbody id="recap-body" class="divide-y"></tbody>
                </table>
                <div id="empty-state" class="p-20 text-center text-slate-300 font-bold">Belum ada data nilai.</div>
            </div>
        </div>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const apiKey = ""; 
        let examKeys = { multipleChoice: [], shortAnswer: [], essay: [] };
        let results = [];

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-indigo-700', 'shadow');
                btn.classList.add('text-white');
            });
            const activeBtn = document.getElementById(`btn-${t}`);
            activeBtn.classList.add('bg-white', 'text-indigo-700', 'shadow');
            activeBtn.classList.remove('text-white');
            if(t === 'recap') renderRecap();
            lucide.createIcons();
        }

        async function processFile(e, type) {
            const file = e.target.files[0];
            if(!file) return;
            const loader = document.getElementById(`loader-${type}`);
            loader.classList.remove('hidden');
            try {
                let images = [];
                if(file.type === 'application/pdf') {
                    const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
                    for(let i=1; i<=pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const canvas = document.createElement('canvas');
                        const viewport = page.getViewport({scale: 2.0});
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
                        images.push(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                    }
                } else {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const img = new Image();
                    img.src = await new Promise(r => {
                        const reader = new FileReader();
                        reader.onload = e => r(e.target.result);
                        reader.readAsDataURL(file);
                    });
                    await new Promise(r => img.onload = r);
                    const maxDim = 1200;
                    let width = img.width;
                    let height = img.height;
                    if (width > height && width > maxDim) { height *= maxDim / width; width = maxDim; }
                    else if (height > maxDim) { width *= maxDim / height; height = maxDim; }
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    images.push(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                }
                if(type === 'key') await analyzeKey(images);
                else await analyzeStudent(images);
            } catch(err) {
                alert("Kesalahan memproses gambar: " + err.message);
            } finally {
                loader.classList.add('hidden');
            }
        }

        async function analyzeKey(images) {
            const parts = images.map(img => ({inlineData: {mimeType: "image/jpeg", data: img}}));
            parts.unshift({text: "Ekstrak kunci ke JSON murni: { \"multipleChoice\": [{\"q\":\"1\", \"k\":\"A\", \"p\":2}], \"shortAnswer\": [{\"q\":\"1\", \"k\":\"kunci\", \"p\":5}], \"essay\": [{\"q\":\"1\", \"k\":\"kriteria\", \"p\":10}] }."});
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{parts}], generationConfig: { responseMimeType: "application/json" } })
                });
                const data = await res.json();
                const json = JSON.parse(data.candidates[0].content.parts[0].text);
                if(json.multipleChoice) examKeys.multipleChoice = json.multipleChoice.map(i => ({ id: Math.random(), question: i.q, key: i.k.toUpperCase().charAt(0), points: parseInt(i.p)||2 }));
                if(json.shortAnswer) examKeys.shortAnswer = json.shortAnswer.map(i => ({ id: Math.random(), question: i.q, key: i.k, points: parseInt(i.p)||5 }));
                if(json.essay) examKeys.essay = json.essay.map(i => ({ id: Math.random(), question: i.q, key: i.k, points: parseInt(i.p)||10 }));
                renderKeys();
            } catch(e) { alert("AI gagal mendeteksi kunci otomatis. Harap isi manual."); }
        }

        async function analyzeStudent(images) {
            const parts = images.map(img => ({inlineData: {mimeType: "image/jpeg", data: img}}));
            parts.unshift({text: "Ekstrak jawaban siswa ke JSON murni: { \"name\": \"...\", \"pg\": \"ABCDE...\", \"isian\": {\"1\": \"...\"}, \"esai\": {\"1\": \"...\"} }."});
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{parts}], generationConfig: { responseMimeType: "application/json" } })
                });
                const data = await res.json();
                const json = JSON.parse(data.candidates[0].content.parts[0].text);
                if(json.name) document.getElementById('student-name').value = json.name;
                if(json.pg) document.getElementById('pg-student-input').value = json.pg.replace(/[^A-Za-z]/g, '').toUpperCase();
                
                const reviewDiv = document.getElementById('manual-review');
                reviewDiv.innerHTML = '';
                examKeys.shortAnswer.forEach(k => {
                    const ans = json.isian?.[k.question] || "";
                    reviewDiv.innerHTML += `
                        <div class="p-3 bg-white border rounded-xl">
                            <label class="text-[10px] font-bold text-slate-400">ISIAN NO ${k.question}</label>
                            <input id="ans-isian-${k.id}" data-q="${k.question}" value="${ans}" class="student-ans-isian w-full text-sm font-medium text-blue-700 outline-none">
                        </div>`;
                });
                examKeys.essay.forEach(k => {
                    const ans = json.esai?.[k.question] || "";
                    reviewDiv.innerHTML += `
                        <div class="p-3 bg-white border rounded-xl">
                            <label class="text-[10px] font-bold text-slate-400">ESAI NO ${k.question}</label>
                            <textarea id="ans-esai-${k.id}" data-q="${k.question}" class="student-ans-esai w-full text-sm font-medium text-orange-700 outline-none h-16">${ans}</textarea>
                        </div>`;
                });
            } catch(e) { alert("Gagal memproses gambar jawaban."); }
        }

        function addItem(type) {
            const num = examKeys[type].length + 1;
            examKeys[type].push({ id: Math.random(), question: num.toString(), key: '', points: type==='multipleChoice'?2:(type==='shortAnswer'?5:10) });
            renderKeys();
        }

        function renderKeys() {
            document.getElementById('pg-container').innerHTML = examKeys.multipleChoice.map((item, idx) => `
                <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border group">
                    <span class="text-xs font-bold text-slate-400 w-6">${idx+1}</span>
                    <input oninput="examKeys.multipleChoice[${idx}].key=this.value.toUpperCase()" value="${item.key}" class="w-10 p-1 text-center bg-white border rounded font-bold uppercase text-xs" maxlength="1" placeholder="K">
                    <input type="number" oninput="examKeys.multipleChoice[${idx}].points=Number(this.value)" value="${item.points}" class="w-12 p-1 text-center bg-white border rounded text-xs ml-auto">
                    <button onclick="examKeys.multipleChoice.splice(${idx},1);renderKeys()" class="text-rose-400"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            document.getElementById('isian-container').innerHTML = examKeys.shortAnswer.map((item, idx) => `
                <div class="bg-slate-50 p-2 rounded-lg border space-y-1">
                    <div class="flex justify-between items-center text-[10px] font-bold">
                        <span>No ${item.question}</span>
                        <input type="number" oninput="examKeys.shortAnswer[${idx}].points=Number(this.value)" value="${item.points}" class="w-10 p-1 bg-white border rounded">
                        <button onclick="examKeys.shortAnswer.splice(${idx},1);renderKeys()" class="text-rose-400">X</button>
                    </div>
                    <input oninput="examKeys.shortAnswer[${idx}].key=this.value" value="${item.key}" placeholder="Kunci" class="w-full p-1 text-xs border rounded">
                </div>
            `).join('');
            document.getElementById('esai-container').innerHTML = examKeys.essay.map((item, idx) => `
                <div class="bg-slate-50 p-2 rounded-lg border space-y-1">
                    <div class="flex justify-between items-center text-[10px] font-bold">
                        <span>No ${item.question}</span>
                        <input type="number" oninput="examKeys.essay[${idx}].points=Number(this.value)" value="${item.points}" class="w-10 p-1 bg-white border rounded">
                        <button onclick="examKeys.essay.splice(${idx},1);renderKeys()" class="text-rose-400">X</button>
                    </div>
                    <textarea oninput="examKeys.essay[${idx}].key=this.value}" class="w-full p-1 text-xs border rounded h-10">${item.key}</textarea>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function submitFinal() {
            const name = document.getElementById('student-name').value.trim();
            const pgInput = document.getElementById('pg-student-input').value.toUpperCase();
            if(!name) return alert("Silakan isi nama siswa!");

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = "SEDANG MENGHITUNG...";

            // 1. HITUNG PG MANUAL (Pasti Berhasil)
            let pgScore = 0;
            examKeys.multipleChoice.forEach((k, idx) => {
                const sAns = pgInput[idx] || "";
                if(sAns === k.key) pgScore += k.points;
            });

            // 2. AMBIL DATA ISIAN/ESAI
            const isianArr = Array.from(document.querySelectorAll('.student-ans-isian')).map(i => ({ q: i.getAttribute('data-q'), a: i.value }));
            const esaiArr = Array.from(document.querySelectorAll('.student-ans-esai')).map(i => ({ q: i.getAttribute('data-q'), a: i.value }));

            let totalIsian = 0;
            let totalEsai = 0;

            try {
                // Panggil AI hanya untuk Isian dan Esai
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{parts: [{text: `KOREKSI JAWABAN. KUNCI ISIAN: ${JSON.stringify(examKeys.shortAnswer)}, KUNCI ESAI: ${JSON.stringify(examKeys.essay)}. JAWABAN SISWA ISIAN: ${JSON.stringify(isianArr)}, ESAI: ${JSON.stringify(esaiArr)}. Berikan skor (0 sampai poin maksimal). Output JSON murni: { \"isianScore\": 10, \"esaiScore\": 20 }.`}]}],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const data = await res.json();
                const json = JSON.parse(data.candidates[0].content.parts[0].text);
                totalIsian = json.isianScore || 0;
                totalEsai = json.esaiScore || 0;
            } catch(e) {
                console.error("AI Error:", e);
                alert("AI sibuk. Skor Isian & Esai diset 0 (Anda bisa edit di Rekap).");
            }

            // SIMPAN DATA
            results.push({
                name,
                timestamp: new Date().toLocaleTimeString('id-ID'),
                pg: pgScore,
                isian: totalIsian,
                esai: totalEsai,
                total: pgScore + totalIsian + totalEsai
            });

            // Reset Form & Pindah Tab
            document.getElementById('student-name').value = '';
            document.getElementById('pg-student-input').value = '';
            document.getElementById('manual-review').innerHTML = '';
            switchTab('recap');
            btn.disabled = false;
            btn.innerText = "HITUNG & SIMPAN NILAI";
        }

        function renderRecap() {
            const body = document.getElementById('recap-body');
            const empty = document.getElementById('empty-state');
            if(results.length === 0) {
                body.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            body.innerHTML = results.map(r => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-4"><div class="font-bold">${r.name}</div><div class="text-[9px] text-slate-400">${r.timestamp}</div></td>
                    <td class="p-4 text-xs font-medium">${r.pg}</td>
                    <td class="p-4 text-xs font-medium text-blue-600">${r.isian}</td>
                    <td class="p-4 text-xs font-medium text-orange-600">${r.esai}</td>
                    <td class="p-4 text-center font-black text-indigo-700 text-lg">${r.total}</td>
                </tr>
            `).reverse().join('');
        }

        function clearRecap() { if(confirm("Hapus rekap?")) { results=[]; renderRecap(); } }

        function downloadCSV() {
            let csv = "Nama,Jam,PG,Isian,Esai,Total\n";
            results.forEach(r => csv += `${r.name},${r.timestamp},${r.pg},${r.isian},${r.esai},${r.total}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'rekap_nilai.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function clearKeys() { if(confirm("Hapus semua kunci?")) { examKeys={multipleChoice:[],shortAnswer:[],essay:[]}; renderKeys(); } }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
