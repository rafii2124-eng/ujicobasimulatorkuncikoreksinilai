<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Grade AI - Koreksi Otomatis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .animate-pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-12">

    <nav class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <i data-lucide="brain-circuit" class="w-8 h-8"></i>
                <h1 class="text-2xl font-bold tracking-tight">Smart Grade AI</h1>
            </div>
            <div class="flex bg-indigo-800/50 p-1 rounded-xl gap-1">
                <button onclick="switchTab('keys')" id="btn-keys" class="tab-btn px-4 py-2 rounded-lg transition-all text-sm font-bold bg-white text-indigo-700 shadow">Kunci Jawaban</button>
                <button onclick="switchTab('upload')" id="btn-upload" class="tab-btn px-4 py-2 rounded-lg transition-all text-sm font-bold text-white hover:bg-indigo-600">Koreksi</button>
                <button onclick="switchTab('recap')" id="btn-recap" class="tab-btn px-4 py-2 rounded-lg transition-all text-sm font-bold text-white hover:bg-indigo-600">Rekap</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        
        <!-- TAB 1: Master Kunci -->
        <div id="tab-keys" class="tab-content active space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">Pengaturan Kunci Jawaban</h2>
                <label class="cursor-pointer bg-indigo-600 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-indigo-700 transition-all flex items-center gap-2">
                    <i data-lucide="file-up" class="w-4 h-4"></i> Upload Kunci
                    <input type="file" class="hidden" accept="image/*,application/pdf" onchange="processFile(event, 'key')">
                </label>
            </div>

            <div id="loader-key" class="hidden p-8 bg-white border-2 border-dashed border-indigo-200 rounded-2xl text-center space-y-3">
                <div class="inline-block w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-indigo-600 font-bold animate-pulse-slow">AI sedang menganalisis kunci jawaban...</p>
            </div>

            <div class="grid lg:grid-cols-2 gap-6">
                <div class="bg-white p-4 rounded-2xl shadow-sm border">
                    <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="list-checks" class="text-indigo-600"></i> Pilihan Ganda</h3>
                    <div id="pg-container" class="space-y-2 max-h-[400px] overflow-y-auto pr-2"></div>
                    <button onclick="addItem('multipleChoice')" class="mt-4 w-full py-2 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-bold hover:border-indigo-300 hover:text-indigo-500 transition-all text-xs">+ Tambah Nomor</button>
                </div>
                <div class="space-y-6">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border">
                        <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="edit-3" class="text-blue-600"></i> Isian Singkat</h3>
                        <div id="isian-container" class="space-y-2"></div>
                        <button onclick="addItem('shortAnswer')" class="mt-2 text-xs text-blue-600 font-bold">+ Tambah Isian</button>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border">
                        <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="file-text" class="text-orange-600"></i> Esai</h3>
                        <div id="esai-container" class="space-y-2"></div>
                        <button onclick="addItem('essay')" class="mt-2 text-xs text-orange-600 font-bold">+ Tambah Esai</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB 2: Koreksi -->
        <div id="tab-upload" class="tab-content max-w-2xl mx-auto space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-xl border space-y-6">
                <div class="space-y-4">
                    <input type="text" id="student-name" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 ring-indigo-500 font-bold" placeholder="Nama Siswa">
                    <label class="w-full flex items-center justify-center gap-3 p-10 border-2 border-dashed border-slate-200 rounded-3xl cursor-pointer hover:bg-slate-50 transition-all">
                        <div class="text-center">
                            <i data-lucide="camera" class="w-12 h-12 mx-auto text-slate-300 mb-2"></i>
                            <p class="font-bold text-slate-500">Klik untuk Scan Lembar Jawaban</p>
                            <p class="text-xs text-slate-400">Pastikan tulisan terbaca jelas</p>
                        </div>
                        <input type="file" class="hidden" accept="image/*,application/pdf" onchange="processFile(event, 'student')">
                    </label>
                </div>

                <div id="loader-student" class="hidden p-6 bg-emerald-50 text-emerald-700 rounded-2xl text-center font-bold animate-pulse">
                    Menganalisis Jawaban Siswa...
                </div>

                <div class="space-y-4 pt-4 border-t">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest">Review Input</h4>
                    <input id="pg-student-input" class="w-full p-4 border rounded-xl text-xl font-mono tracking-[0.4em] uppercase" placeholder="Ketik PG jika tidak terdeteksi (Contoh: ABCDE)">
                    <div id="manual-review" class="space-y-3"></div>
                    <button id="btn-submit" onclick="submitFinal()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg hover:bg-indigo-700 transition-all">SIMPAN & HITUNG NILAI</button>
                </div>
            </div>
        </div>

        <!-- TAB 3: Rekap -->
        <div id="tab-recap" class="tab-content space-y-6">
            <h2 class="text-xl font-bold">Data Nilai Terkoreksi</h2>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b">
                        <tr class="text-[10px] font-black text-slate-400 uppercase">
                            <th class="p-4">Siswa</th>
                            <th class="p-4">PG</th>
                            <th class="p-4">Isian</th>
                            <th class="p-4">Esai</th>
                            <th class="p-4 text-center">Skor</th>
                        </tr>
                    </thead>
                    <tbody id="recap-body" class="divide-y"></tbody>
                </table>
                <div id="empty-state" class="p-20 text-center text-slate-300 font-bold">Belum ada data nilai.</div>
            </div>
        </div>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const apiKey = "";
        let examKeys = { multipleChoice: [], shortAnswer: [], essay: [] };
        let results = [];

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('bg-white', 'text-indigo-700', 'shadow'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.add('text-white'));
            const activeBtn = document.getElementById(`btn-${t}`);
            activeBtn.classList.add('bg-white', 'text-indigo-700', 'shadow');
            activeBtn.classList.remove('text-white');
            if(t === 'recap') renderRecap();
            lucide.createIcons();
        }

        async function processFile(e, type) {
            const file = e.target.files[0];
            if(!file) return;

            const loader = document.getElementById(`loader-${type}`);
            loader.classList.remove('hidden');

            try {
                let images = [];
                if(file.type === 'application/pdf') {
                    const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
                    for(let i=1; i<=pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const canvas = document.createElement('canvas');
                        const viewport = page.getViewport({scale: 1.5});
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
                        images.push(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                    }
                } else {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const img = new Image();
                    img.src = await new Promise(r => {
                        const reader = new FileReader();
                        reader.onload = e => r(e.target.result);
                        reader.readAsDataURL(file);
                    });
                    await new Promise(r => img.onload = r);
                    const scale = Math.min(1200 / img.width, 1);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    images.push(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                }

                if(type === 'key') await analyzeKey(images);
                else await analyzeStudent(images);

            } catch(err) {
                alert("Error: " + err.message);
            } finally {
                loader.classList.add('hidden');
                e.target.value = '';
            }
        }

        async function callAI(parts) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{parts}],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            if(!res.ok) throw new Error("API Error: " + res.status);
            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            // Clean AI response from potential markdown backticks
            const cleaned = text.replace(/```json/g, "").replace(/```/g, "").trim();
            return JSON.parse(cleaned);
        }

        async function analyzeKey(images) {
            const parts = images.map(img => ({inlineData: {mimeType: "image/jpeg", data: img}}));
            parts.unshift({text: "Ekstrak kunci jawaban dari gambar ini. Output JSON murni: { \"multipleChoice\": [{\"q\":\"1\", \"k\":\"A\", \"p\":2}], \"shortAnswer\": [{\"q\":\"Label\", \"k\":\"Jawaban\", \"p\":5}], \"essay\": [{\"q\":\"Label\", \"k\":\"Kriteria\", \"p\":10}] }"});
            
            const data = await callAI(parts);
            if(data.multipleChoice) examKeys.multipleChoice = data.multipleChoice.map(i => ({id: Math.random(), question: i.q, key: i.k, points: i.p}));
            if(data.shortAnswer) examKeys.shortAnswer = data.shortAnswer.map(i => ({id: Math.random(), question: i.q, key: i.k, points: i.p}));
            if(data.essay) examKeys.essay = data.essay.map(i => ({id: Math.random(), question: i.q, key: i.k, points: i.p}));
            renderKeys();
        }

        async function analyzeStudent(images) {
            const parts = images.map(img => ({inlineData: {mimeType: "image/jpeg", data: img}}));
            parts.unshift({text: "Ekstrak jawaban siswa. Output JSON: { \"name\": \"...\", \"pg\": \"ABC...\", \"isian\": {\"Q\": \"Ans\"}, \"esai\": {\"Q\": \"Ans\"} }"});
            
            const data = await callAI(parts);
            if(data.name) document.getElementById('student-name').value = data.name;
            if(data.pg) document.getElementById('pg-student-input').value = data.pg.replace(/\s/g, '').toUpperCase();
            
            const reviewDiv = document.getElementById('manual-review');
            reviewDiv.innerHTML = '';
            
            examKeys.shortAnswer.forEach(k => {
                const ans = data.isian?.[k.question] || "";
                reviewDiv.innerHTML += `
                    <div class="p-3 bg-white border rounded-xl">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">${k.question}</label>
                        <input id="ans-isian-${k.id}" value="${ans}" class="w-full text-sm outline-none font-medium">
                    </div>
                `;
            });
            examKeys.essay.forEach(k => {
                const ans = data.esai?.[k.question] || "";
                reviewDiv.innerHTML += `
                    <div class="p-3 bg-white border rounded-xl">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">${k.question}</label>
                        <textarea id="ans-esai-${k.id}" class="w-full text-sm outline-none font-medium h-16">${ans}</textarea>
                    </div>
                `;
            });
        }

        function addItem(type) {
            examKeys[type].push({id: Math.random(), question: `Soal ${examKeys[type].length+1}`, key: '', points: type==='multipleChoice'?2:10});
            renderKeys();
        }

        function renderKeys() {
            document.getElementById('pg-container').innerHTML = examKeys.multipleChoice.map((item, idx) => `
                <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border group">
                    <span class="w-6 text-xs font-bold text-slate-400">${idx+1}</span>
                    <input oninput="examKeys.multipleChoice[${idx}].question=this.value" value="${item.question}" class="flex-1 bg-transparent text-xs font-medium outline-none">
                    <input oninput="examKeys.multipleChoice[${idx}].key=this.value.toUpperCase()" value="${item.key}" class="w-8 p-1 text-center bg-white border rounded font-bold uppercase text-xs" maxlength="1">
                    <input type="number" oninput="examKeys.multipleChoice[${idx}].points=Number(this.value)" value="${item.points}" class="w-10 p-1 text-center bg-white border rounded text-xs">
                    <button onclick="examKeys.multipleChoice.splice(${idx},1);renderKeys()" class="opacity-0 group-hover:opacity-100 text-rose-400"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                </div>
            `).join('');

            document.getElementById('isian-container').innerHTML = examKeys.shortAnswer.map((item, idx) => `
                <div class="bg-slate-50 p-2 rounded-lg border text-[10px] space-y-1">
                    <input oninput="examKeys.shortAnswer[${idx}].question=this.value" value="${item.question}" class="w-full bg-transparent font-bold outline-none">
                    <div class="flex gap-2">
                        <input oninput="examKeys.shortAnswer[${idx}].key=this.value" value="${item.key}" placeholder="Kunci" class="flex-1 p-1 bg-white border rounded">
                        <input type="number" oninput="examKeys.shortAnswer[${idx}].points=Number(this.value)" value="${item.points}" class="w-8 p-1 bg-white border rounded text-center">
                    </div>
                </div>
            `).join('');

            document.getElementById('esai-container').innerHTML = examKeys.essay.map((item, idx) => `
                <div class="bg-slate-50 p-2 rounded-lg border text-[10px] space-y-1">
                    <input oninput="examKeys.essay[${idx}].question=this.value" value="${item.question}" class="w-full bg-transparent font-bold outline-none">
                    <div class="flex gap-2">
                        <textarea oninput="examKeys.essay[${idx}].key=this.value}" class="flex-1 p-1 bg-white border rounded h-10">${item.key}</textarea>
                        <input type="number" oninput="examKeys.essay[${idx}].points=Number(this.value)" value="${item.points}" class="w-8 p-1 bg-white border rounded text-center h-10">
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function submitFinal() {
            const name = document.getElementById('student-name').value;
            const pgInput = document.getElementById('pg-student-input').value.split('');
            const btn = document.getElementById('btn-submit');
            if(!name) return alert("Isi nama siswa!");

            btn.disabled = true;
            btn.innerText = "MENGHITUNG...";

            const studentAnswers = {
                pg: pgInput,
                isian: examKeys.shortAnswer.map(k => ({id: k.id, q: k.question, a: document.getElementById(`ans-isian-${k.id}`).value})),
                essay: examKeys.essay.map(k => ({id: k.id, q: k.question, a: document.getElementById(`ans-esai-${k.id}`).value}))
            };

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{parts: [{text: `Koreksi jawaban siswa terhadap kunci. Berikan skor yang adil untuk isian dan esai. KUNCI: ${JSON.stringify(examKeys)}, SISWA: ${JSON.stringify(studentAnswers)}. Output JSON murni: { "details": {"pg": [{"score": 2}], "isian": [{"score": 5}], "esai": [{"score": 10}]}, "total": 100 }`}]}],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const analysis = await res.json();
                const cleaned = analysis.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "").trim();
                const final = JSON.parse(cleaned);

                results.push({ name, timestamp: new Date().toLocaleString('id-ID'), final });
                switchTab('recap');
                
                // Clear fields
                document.getElementById('student-name').value = '';
                document.getElementById('pg-student-input').value = '';
                document.getElementById('manual-review').innerHTML = '';
            } catch(e) {
                alert("Gagal menghitung nilai. Periksa koneksi.");
            } finally {
                btn.disabled = false;
                btn.innerText = "SIMPAN & HITUNG NILAI";
            }
        }

        function renderRecap() {
            const body = document.getElementById('recap-body');
            const empty = document.getElementById('empty-state');
            if(results.length === 0) {
                body.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            body.innerHTML = results.map(r => {
                const det = r.final.details || {};
                const pgS = (det.pg || []).reduce((a,b)=>a+(b.score||0), 0);
                const iS = (det.isian || []).reduce((a,b)=>a+(b.score||0), 0);
                const eS = (det.esai || []).reduce((a,b)=>a+(b.score||0), 0);
                return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-4 font-bold"><div>${r.name}</div><div class="text-[9px] text-slate-400 font-normal">${r.timestamp}</div></td>
                        <td class="p-4 text-xs font-medium text-slate-500">${pgS}</td>
                        <td class="p-4 text-xs font-medium text-blue-600">${iS}</td>
                        <td class="p-4 text-xs font-medium text-orange-600">${eS}</td>
                        <td class="p-4 text-center font-black text-indigo-700 text-lg">${r.final.total || (pgS+iS+eS)}</td>
                    </tr>
                `;
            }).reverse().join('');
        }

        window.onload = () => { lucide.createIcons(); renderKeys(); };
    </script>
</body>
</html>
